<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Card</title>
  <link rel="stylesheet" href="./src/style.css" />
</head>

<body>

  <div class="page-wrapper">
    <article data-testid="test-todo-card" role="region" aria-label="Todo task card">

      <div class="card-header">
        <div class="card-header-left">
          <input type="checkbox" data-testid="test-todo-complete-toggle" id="todo-toggle"
            aria-label="Mark task as complete" />
          <label for="todo-toggle" class="sr-only">Mark complete</label>
          <div class="title-group">
            <p class="card-eyebrow" aria-hidden="true">Task #001</p>
            <h2 data-testid="test-todo-title">Deploy API to Production</h2>
          </div>
        </div>
        <span data-testid="test-todo-priority" class="priority" aria-label="Priority: High">High</span>
      </div>

      <p data-testid="test-todo-description">
        Finalize the Express server, push to GitHub, and deploy the classify endpoint on Vercel. Verify all test IDs
        pass the grading script before submission.
      </p>

      <div class="card-divider" aria-hidden="true"></div>

      <div class="card-meta">
        <div class="meta-block">
          <p class="meta-label">Due Date</p>
          <time data-testid="test-todo-due-date" datetime="2026-04-16T23:59:00Z">Apr 16, 2026</time>
        </div>
        <div class="meta-block">
          <p class="meta-label">Time Left</p>
          <span data-testid="test-todo-time-remaining" aria-live="polite" aria-atomic="true"></span>
        </div>
      </div>

      <div class="status-row">
        <span data-testid="test-todo-status" class="status-inprogress" aria-label="Status: In Progress">In
          Progress</span>
      </div>

      <ul data-testid="test-todo-tags" role="list" aria-label="Task tags">
        <li data-testid="test-todo-tag-work">work</li>
        <li data-testid="test-todo-tag-urgent">urgent</li>
        <li>backend</li>
      </ul>

      <div class="card-actions">
        <button data-testid="test-todo-edit-button" aria-label="Edit task" onclick="console.log('edit clicked')">✎
          Edit</button>
        <button data-testid="test-todo-delete-button" aria-label="Delete task" onclick="alert('Delete clicked')">⌫
          Delete</button>
      </div>

      <!-- </div> -->
    </article>
  </div>

  <script src="./src/main.js">

  </script>
</body>

</html>
